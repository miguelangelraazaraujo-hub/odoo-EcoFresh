services:
  web:
    image: odoo:17.0
    command: odoo --log-level=debug --country=es
    depends_on:
      - db
    ports:
      - "80:8069"
    volumes:
      - ./addons:/mnt/extra-addons
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
   